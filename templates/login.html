<h2>Laurier Student Login</h2>

<form method="POST">
  <label for="email">Laurier Email:</label>
  <input type="email" id="email" name="email" placeholder="abc1234@mylaurier.ca" required>

  <button type="submit">Login</button>
</form>

{% if error %}
  <p style="color:red;">{{ error }}</p>
{% endif %}
